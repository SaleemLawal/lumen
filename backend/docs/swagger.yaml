definitions:
  domain.AccountSummary:
    properties:
      account_id:
        example: "1234567890"
        type: string
      name:
        example: Checking Account
        type: string
      subtype:
        example: checking
        type: string
      type:
        example: checking
        type: string
    type: object
  domain.PlaidItemSummary:
    properties:
      accounts:
        items:
          $ref: '#/definitions/domain.AccountSummary'
        type: array
      id:
        example: "1234567890"
        type: string
      institution_id:
        example: "1234567890"
        type: string
    type: object
  main.ErrorResponse:
    properties:
      error:
        example: The server encountered a problem and could not process your request
        type: string
    type: object
  main.ExchangePublicTokenRequest:
    properties:
      public_token:
        example: public-sandbox-abc123
        type: string
    type: object
  main.PlaidExchangePublicTokenResponse:
    properties:
      status:
        example: linked
        type: string
    type: object
info:
  contact: {}
paths:
  /api/v1/health:
    get:
      consumes:
      - application/json
      description: Check the health of the server
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
  /api/v1/plaid/exchange-public-token:
    post:
      consumes:
      - application/json
      description: Exchanges a Link public_token server-side, stores the encrypted
        access token and item, then fetches and persists the user's accounts from
        Plaid.
      parameters:
      - description: public_token from Link onSuccess
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/main.ExchangePublicTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.PlaidExchangePublicTokenResponse'
        "400":
          description: Invalid JSON body or unknown fields
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "415":
          description: 'Unsupported Content-Type (allowed: application/json, text/xml)'
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Plaid or server error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Exchange Plaid public token
      tags:
      - plaid
  /api/v1/plaid/items:
    get:
      description: Returns all linked Plaid items with their synced accounts.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.PlaidItemSummary'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: List linked institutions
      tags:
      - plaid
  /api/v1/plaid/items/{id}/link-token:
    get:
      description: Returns a Plaid link token configured for account selection update
        mode for an existing item.
      parameters:
      - description: Plaid item UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: link token
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Create update-mode link token
      tags:
      - plaid
  /api/v1/plaid/items/{id}/sync-accounts:
    post:
      description: Re-fetches accounts from Plaid for an existing item and upserts
        them (soft sync — adds new, updates existing, never deletes).
      parameters:
      - description: Plaid item UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.PlaidExchangePublicTokenResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Sync accounts for an item
      tags:
      - plaid
  /api/v1/plaid/link-token:
    get:
      consumes:
      - application/json
      description: Create a Plaid link token
      produces:
      - application/json
      responses:
        "200":
          description: plaid-sandbox-1234567890
          schema:
            type: string
        "415":
          description: 'Unsupported Content-Type (allowed: application/json, text/xml)'
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Plaid or server error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Create Plaid link token
      tags:
      - plaid
swagger: "2.0"
